spring:
  application:
    name: marketplace-api

  # Database Connection
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:marketplace_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:secretpassword}
    driver-class-name: org.postgresql.Driver

  # JPA & Hibernate
  jpa:
    hibernate:
      # Senior Practice: ห้ามใช้ update บน Production เด็ดขาด! ให้ใช้ validate เพื่อเช็คว่า DB ตรงกับ Entity ไหม
      ddl-auto: update
    show-sql: true # แสดง SQL Query ใน Console
    properties:
      hibernate:
        format_sql: true

  # Redis Connection
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Performance Tuning (Java 21 Virtual Threads)
  threads:
    virtual:
      enabled: true

# Swagger UI Config (http://localhost:8080/swagger-ui/index.html)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  # อายุของ Token: 86400000 ms = 24 ชั่วโมง
  expiration-ms: 86400000