spring:
  application:
    name: marketplace-api

  # Database Connection
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:marketplace_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:secretpassword}
    driver-class-name: org.postgresql.Driver

  # JPA & Hibernate
  jpa:
    hibernate:
      # Use validate in production after migrations are introduced.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis Connection
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Kafka Connection
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:marketplace-api}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  # Performance Tuning (Java 21 Virtual Threads)
  threads:
    virtual:
      enabled: true

# Swagger UI Config (http://localhost:8080/swagger-ui/index.html)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

app:
  kafka:
    topics:
      shop-created: ${KAFKA_TOPIC_SHOP_CREATED:shop-created}
  outbox:
    publisher:
      enabled: ${OUTBOX_PUBLISHER_ENABLED:true}
      publish-interval-ms: ${OUTBOX_PUBLISH_INTERVAL_MS:5000}
      batch-size: ${OUTBOX_BATCH_SIZE:50}
      max-retry-count: ${OUTBOX_MAX_RETRY_COUNT:5}
      send-timeout-ms: ${OUTBOX_SEND_TIMEOUT_MS:10000}
  admin:
    username: ${ADMIN_USERNAME:system_admin}
    email: ${ADMIN_EMAIL:admin@marketplace.com}
    password: ${ADMIN_PASSWORD:Admin@1234}
    first-name: ${ADMIN_FIRST_NAME:System}
    last-name: ${ADMIN_LAST_NAME:Administrator}
